# TR126 Phase 3: Backend Matrix Rerun (Linux)
#
# Matches Phase 2 factorial design. Tests backend rankings at scale:
#   HF models:  gpt2-100m, qwen2.5-0.5b, qwen2.5-1.5b, qwen2.5-3b
#   Ollama:     qwen2.5:0.5b, qwen2.5:1.5b, qwen2.5:3b, llama3.2:1b
#
# Qwen2.5 at 3 scales enables direct HF vs Ollama cross-backend comparison.

tier3_config: research/tr117/configs/matrix_tier3.yaml

backends:
  - transformers-gpu
  - transformers-gpu-compile
  - ollama

models:
  # HF-only models (transformers backends)
  - name: models/gpt2-100m
    description: "100M params - GPT-2 MHA baseline (HF only)"
    params_millions: 100
    dtype: fp32
    ollama_tag: null
  # Qwen2.5 family: HF + Ollama at 3 scales for cross-backend comparison
  - name: models/qwen2.5-0.5b
    description: "0.5B params - Qwen2.5 GQA small (HF + Ollama)"
    params_millions: 500
    dtype: fp16
    ollama_tag: "qwen2.5:0.5b"
  - name: models/qwen2.5-1.5b
    description: "1.5B params - Qwen2.5 GQA medium (HF + Ollama)"
    params_millions: 1500
    dtype: fp16
    ollama_tag: "qwen2.5:1.5b"
  - name: models/qwen2.5-3b
    description: "3B params - Qwen2.5 GQA large (HF + Ollama)"
    params_millions: 3000
    dtype: fp16
    ollama_tag: "qwen2.5:3b"
  # Ollama-only (different architecture for diversity)
  - name: llama3.2:1b
    description: "1B params - Llama 3.2 (Ollama only)"
    params_millions: 1000
    ollama_tag: "llama3.2:1b"

scenarios:
  - single_micro
  - single_short
  - single_medium
  - single_long
  - stress_single

device: cuda

repetitions: 15    # Bumped from 7 for tighter CIs
warmup_repetitions: 3
max_new_tokens: 128
seed: 42

torch_compile:
  enabled: true
  backend: inductor
  mode: reduce-overhead
  dynamic: false
  fullgraph: false

modes:
  - prefill
  - kv_decode
  - e2e_kv

ollama_url: http://host.docker.internal:11434
ollama_timeout_s: 120

output_dir: research/tr126/results/phase3
