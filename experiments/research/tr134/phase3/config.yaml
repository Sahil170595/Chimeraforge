backends:
  - name: ollama
    ollama_url: http://localhost:11434
    extra:
      timeout_s: 300

task_paths:
  # Safety tasks
  - research/tr134/phase3/tasks/advbench_refusal.yaml
  - research/tr134/phase3/tasks/truthfulqa.yaml
  - research/tr134/phase3/tasks/bbq_bias.yaml
  - research/tr134/phase3/tasks/jailbreak_amplification.yaml
  # Capability tasks
  - research/tr134/phase3/tasks/mmlu_real.yaml
  - research/tr134/phase3/tasks/arc_challenge.yaml

benchmarks: []
repetitions: 1
seed: 42
max_new_tokens: 256
temperature: 0.0
batch_size: 1
warmup_runs: 2
backend_skip: {}
perplexity:
  enabled: false
resource_monitor: false
output_dir: research/tr134/results/phase3
