# TR134 Phase 3: Multi-Family Safety Under Quantization
# 4 models × 6-7 quants × 6 tasks ≈ 26 entries × 955 prompts ≈ 24,830 samples
#
# Purpose: Expand Phase 2 to multiple model families, add LLM judge validation,
# jailbreak amplification testing, and per-category bias breakdown.
# Note: Gemma 2 dropped — Ollama lacks per-quant tags for gemma2:2b-it.

experiment: tr134_phase3_multi_family
description: >
  Multi-family alignment robustness under quantization. 4 model families
  (Llama 3.2 1B/3B, Mistral 7B, Qwen 2.5 7B) across 6-7
  quantization levels. Safety benchmarks (AdvBench, TruthfulQA, BBQ, jailbreak)
  + capability benchmarks (MMLU, ARC-Challenge). Post-hoc LLM judge validation.

