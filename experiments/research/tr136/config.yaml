# TR136: Cross-Backend Safety Consistency
# 3 models x 4 backend configs x 870 prompts = ~10,440 samples
#
# Research question: Do Ollama, vLLM, and TGI produce different safety
# outputs from the same model weights?

experiment: tr136_cross_backend_safety
description: >
  Cross-backend safety consistency. Tests whether serving backend choice
  (Ollama Q4_K_M, Ollama Q8_0, vLLM FP16, TGI FP16) affects safety
  behavior. Three models across two families (Llama 3.2 1B/3B, Qwen 2.5
  1.5B) — all small enough for FP16 on consumer GPU. Safety benchmarks
  (AdvBench, TruthfulQA, BBQ, jailbreak) + MMLU/ARC capability controls.

models:
  - name: llama3.2-1b
    hf_id: "unsloth/Llama-3.2-1B-Instruct"
    ollama_tag: "llama3.2:1b"
    params_m: 1236
    gated: false

  - name: llama3.2-3b
    hf_id: "unsloth/Llama-3.2-3B-Instruct"
    ollama_tag: "llama3.2:3b"
    params_m: 3213
    gated: false

  - name: qwen2.5-1.5b
    hf_id: "Qwen/Qwen2.5-1.5B-Instruct"
    ollama_tag: "qwen2.5:1.5b"
    params_m: 1543
    gated: false

backends:
  ollama:
    port: 11434
    timeout_s: 120
  vllm:
    port: 8000
    timeout_s: 180
    docker_image: "vllm/vllm-openai:latest"
    docker_name: "tr136-vllm"
    startup_timeout_s: 300
    extra_args:
      - "--max-model-len"
      - "2048"
      - "--dtype"
      - "float16"
      - "--enforce-eager"
      - "--gpu-memory-utilization"
      - "0.80"
  tgi:
    port: 8080
    timeout_s: 180
    docker_image: "ghcr.io/huggingface/text-generation-inference:latest"
    docker_name: "tr136-tgi"
    startup_timeout_s: 300
    extra_args:
      - "--max-input-length"
      - "1024"
      - "--max-total-tokens"
      - "2048"

# Backend evaluation order (sequential — they share the GPU)
backend_order:
  - {name: ollama, label: ollama_q4_k_m, quant: Q4_K_M}
  - {name: ollama, label: ollama_q8_0, quant: Q8_0}
  - {name: vllm, label: vllm_fp16, quant: FP16}
  - {name: tgi, label: tgi_fp16, quant: FP16}

task_paths:
  # Safety tasks
  - research/tr136/tasks/advbench_refusal.yaml
  - research/tr136/tasks/truthfulqa.yaml
  - research/tr136/tasks/bbq_bias.yaml
  - research/tr136/tasks/jailbreak_amplification.yaml
  # Capability controls
  - research/tr136/tasks/mmlu_real.yaml
  - research/tr136/tasks/arc_challenge.yaml

max_new_tokens: 256
temperature: 0.0
seed: 42
warmup_requests: 3
cooldown_between_backends_s: 10

output_dir: research/tr136/results
