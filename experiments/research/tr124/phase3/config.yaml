# TR124 Phase 3: Sampling Variance Analysis
# Do backends produce different quality variance under non-greedy decoding?
# Subset of models/backends, 5 reps at temperature=0.7
#
# Run: python research/tr124/phase3/run.py
# Analyze: python research/tr124/phase3/analyze.py

experiment: tr124_phase3_sampling
description: >
  Measure quality variance under non-greedy decoding (temperature=0.7).
  Tests whether backend implementation affects output diversity and quality
  stability. Uses 5 repetitions per sample to compute coefficient of
  variation and assess reproducibility of quality estimates.

models:
  - name: qwen2.5-1.5b
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
  - name: llama-3.2-1b
    path: unsloth/Llama-3.2-1B
    params_m: 1236

backends:
  - name: transformers-gpu
    device: cuda
  - name: transformers-gpu-compile
    device: cuda
    compile_model: true

task_paths:
  - scripts/eval/tasks/builtin/summarization.yaml
  - scripts/eval/tasks/builtin/qa.yaml
  - scripts/eval/tasks/builtin/creative_writing.yaml

benchmarks: []

# Non-greedy: temperature=0.7, 5 reps to measure variance
repetitions: 5
seed: 42
max_new_tokens: 256
temperature: 0.7
batch_size: 1
warmup_runs: 2

backend_skip: {}

perplexity:
  enabled: false

resource_monitor: false
output_dir: results/eval/tr124_phase3
