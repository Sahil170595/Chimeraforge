# TR123: torch.compile-only re-run (Docker + Triton)
# Only the compile backend — GPU/CPU results already collected on Windows.

models:
  - name: gpt2
    path: gpt2
    params_m: 124
    gated: false
    attention_type: MHA
    fp16_vram_gb: 0.3
    architecture:
      n_layers: 12
      n_heads: 12
      n_kv_heads: 12
      d_head: 64
      d_model: 768

  - name: llama-3.2-1b
    path: unsloth/Llama-3.2-1B
    params_m: 1236
    gated: false
    attention_type: GQA
    fp16_vram_gb: 2.5
    architecture:
      n_layers: 16
      n_heads: 32
      n_kv_heads: 8
      d_head: 64
      d_model: 2048

  - name: qwen2.5-1.5b
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
    gated: false
    attention_type: GQA
    fp16_vram_gb: 3.1
    architecture:
      n_layers: 28
      n_heads: 12
      n_kv_heads: 2
      d_head: 128
      d_model: 1536

  - name: phi-2
    path: microsoft/phi-2
    params_m: 2700
    gated: false
    attention_type: MHA
    trust_remote_code: true
    fp16_vram_gb: 5.4
    architecture:
      n_layers: 32
      n_heads: 32
      n_kv_heads: 32
      d_head: 80
      d_model: 2560

# llama-3.2-3b excluded — too tight on VRAM with compile overhead (same as main config)

backends:
  - transformers-gpu-compile

backend_skip: {}

scenarios:
  - name: short_prompt
    prompt_tokens: 64
    generate_tokens: 64
  - name: medium_prompt
    prompt_tokens: 256
    generate_tokens: 128
  - name: long_prompt
    prompt_tokens: 512
    generate_tokens: 256
  - name: long_context
    prompt_tokens: 1024
    generate_tokens: 128
  - name: decode_heavy
    prompt_tokens: 64
    generate_tokens: 512

repetitions: 7
warmup_runs: 2
seed: 42

measurement:
  cuda_events: true
  resource_monitor: true
  monitor_interval_s: 0.1
  memory_snapshots: true

kv_cache:
  measure_memory_overhead: false

cloud_pricing:
  aws_g5_xlarge:
    on_demand: 1.006
    spot: 0.302
    reserved_1yr: 0.704
    reserved_3yr: 0.503
  azure_nc_t4_v3:
    on_demand: 0.90
    spot: 0.27
    reserved_1yr: 0.60
    reserved_3yr: 0.42
  gcp_a2_highgpu:
    on_demand: 1.20
    spot: 0.36
    reserved_1yr: 0.80
    reserved_3yr: 0.56
  consumer_rtx4080:
    hardware_cost: 1200.0
    amortization_years: 3
    effective_hourly: 0.046

energy:
  usd_per_kwh: 0.20
  carbon_intensity_gco2e_per_kwh: 500.0

output:
  results_dir: research/tr123/results
