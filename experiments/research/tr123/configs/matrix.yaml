# TR123: KV-Cache Production Economics — Experiment Matrix
# Goal: Measure real $/tok with KV-cached two-phase inference across
# diverse model architectures (MHA vs GQA), sizes (124M → 3.2B), and backends.

models:
  # --- Baseline: fast, well-understood ---
  - name: gpt2
    path: gpt2
    params_m: 124
    gated: false
    attention_type: MHA
    fp16_vram_gb: 0.3
    architecture:
      n_layers: 12
      n_heads: 12
      n_kv_heads: 12  # MHA: n_kv_heads == n_heads
      d_head: 64
      d_model: 768

  # --- Modern GQA, lightweight ---
  - name: llama-3.2-1b
    path: unsloth/Llama-3.2-1B
    params_m: 1236
    gated: false
    attention_type: GQA
    fp16_vram_gb: 2.5
    architecture:
      n_layers: 16
      n_heads: 32
      n_kv_heads: 8   # GQA: 4 query heads per KV head
      d_head: 64
      d_model: 2048

  # --- Extreme GQA (only 2 KV heads) ---
  - name: qwen2.5-1.5b
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
    gated: false
    attention_type: GQA
    fp16_vram_gb: 3.1
    architecture:
      n_layers: 28
      n_heads: 12
      n_kv_heads: 2   # GQA: 6 query heads per KV head — extreme ratio
      d_head: 128
      d_model: 1536

  # --- MHA contrast at 2.7B ---
  - name: phi-2
    path: microsoft/phi-2
    params_m: 2700
    gated: false
    attention_type: MHA
    trust_remote_code: true
    fp16_vram_gb: 5.4
    architecture:
      n_layers: 32
      n_heads: 32
      n_kv_heads: 32  # MHA: full multi-head
      d_head: 80
      d_model: 2560

  # --- Largest FP16 model that fits 12GB ---
  - name: llama-3.2-3b
    path: unsloth/Llama-3.2-3B
    params_m: 3213
    gated: false
    attention_type: GQA
    fp16_vram_gb: 6.4
    architecture:
      n_layers: 28
      n_heads: 24
      n_kv_heads: 8   # GQA: 3 query heads per KV head
      d_head: 128
      d_model: 3072

backends:
  - transformers-gpu-compile
  - transformers-gpu
  - transformers-cpu

# Per-model backend overrides: skip CPU for large models (too slow)
# and skip torch.compile for models where it's unstable.
backend_skip:
  phi-2:
    - transformers-cpu           # 2.7B on CPU: ~10min per measurement
  llama-3.2-3b:
    - transformers-cpu           # 3.2B on CPU: too slow
    - transformers-gpu-compile   # tight on VRAM with compile overhead

scenarios:
  - name: short_prompt
    prompt_tokens: 64
    generate_tokens: 64
  - name: medium_prompt
    prompt_tokens: 256
    generate_tokens: 128
  - name: long_prompt
    prompt_tokens: 512
    generate_tokens: 256
  - name: long_context
    prompt_tokens: 1024
    generate_tokens: 128
  - name: decode_heavy
    prompt_tokens: 64
    generate_tokens: 512

repetitions: 7
warmup_runs: 2
# batch_size is always 1 for this experiment (single-sequence focus).
# Multi-batch economics are deferred to TR128.
seed: 42

measurement:
  cuda_events: true
  resource_monitor: true
  monitor_interval_s: 0.1
  memory_snapshots: true

kv_cache:
  measure_memory_overhead: true
  context_lengths: [64, 128, 256, 512, 1024, 2048]

cloud_pricing:
  aws_g5_xlarge:
    on_demand: 1.006
    spot: 0.302
    reserved_1yr: 0.704
    reserved_3yr: 0.503
  azure_nc_t4_v3:
    on_demand: 0.90
    spot: 0.27
    reserved_1yr: 0.60
    reserved_3yr: 0.42
  gcp_a2_highgpu:
    on_demand: 1.20
    spot: 0.36
    reserved_1yr: 0.80
    reserved_3yr: 0.56
  consumer_rtx4080:
    hardware_cost: 1200.0
    amortization_years: 3
    effective_hourly: 0.046

energy:
  usd_per_kwh: 0.20
  carbon_intensity_gco2e_per_kwh: 500.0

output:
  results_dir: research/tr123/results
