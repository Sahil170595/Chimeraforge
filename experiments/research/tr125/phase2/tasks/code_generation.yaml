      def bfs(graph, start):
          from collections import deque
          visited = set([start])
          queue = deque([start])
          order = []
          while queue:
              node = queue.popleft()
              order.append(node)
              for neighbor in graph.get(node, []):
                  if neighbor not in visited:
                      visited.add(neighbor)
                      queue.append(neighbor)
          return order

