      def insertion_sort(lst):
          result = lst[:]
          for i in range(1, len(result)):
              key = result[i]
              j = i - 1
              while j >= 0 and result[j] > key:
                  result[j + 1] = result[j]
                  j -= 1
              result[j + 1] = key
          return result

  - id: code_025
    task_description: "computes the Levenshtein edit distance between two strings."
    reference: |
      def edit_distance(s1, s2):
          m, n = len(s1), len(s2)
          dp = [[0] * (n + 1) for _ in range(m + 1)]
          for i in range(m + 1):
              dp[i][0] = i
          for j in range(n + 1):
              dp[0][j] = j
          for i in range(1, m + 1):
              for j in range(1, n + 1):
                  cost = 0 if s1[i - 1] == s2[j - 1] else 1
                  dp[i][j] = min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost)
          return dp[m][n]

