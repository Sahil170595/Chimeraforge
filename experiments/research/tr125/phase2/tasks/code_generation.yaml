      def run_length_decode(s):
          result = []
          i = 0
          while i < len(s):
              char = s[i]
              i += 1
              num = []
              while i < len(s) and s[i].isdigit():
                  num.append(s[i])
                  i += 1
              result.append(char * int("".join(num)))
          return "".join(result)

