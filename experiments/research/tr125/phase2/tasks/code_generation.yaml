      def to_binary(n):
          if n == 0:
              return '0'
          negative = n < 0
          n = abs(n)
          bits = []
          while n:
              bits.append(str(n % 2))
              n //= 2
          result = ''.join(reversed(bits))
          return '-' + result if negative else result

