    task_description: "computes the mean, median, and mode of a list of numbers and returns them as a dictionary."
    reference: |
      def stats(lst):
          from collections import Counter
          n = len(lst)
          mean = sum(lst) / n
          sorted_lst = sorted(lst)
          mid = n // 2
          median = sorted_lst[mid] if n % 2 else (sorted_lst[mid - 1] + sorted_lst[mid]) / 2
          counts = Counter(lst)
          mode = max(counts, key=counts.get)
          return {'mean': mean, 'median': median, 'mode': mode}

