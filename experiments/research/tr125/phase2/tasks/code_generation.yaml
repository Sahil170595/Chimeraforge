    task_description: "implements a simple LRU cache with get and put methods using an OrderedDict."
    reference: |
      from collections import OrderedDict

      class LRUCache:
          def __init__(self, capacity):
              self.capacity = capacity
              self.cache = OrderedDict()
          def get(self, key):
              if key not in self.cache:
                  return -1
              self.cache.move_to_end(key)
              return self.cache[key]
          def put(self, key, value):
              if key in self.cache:
                  self.cache.move_to_end(key)
              self.cache[key] = value
              if len(self.cache) > self.capacity:
                  self.cache.popitem(last=False)

  - id: code_049
    task_description: "performs topological sort on a directed acyclic graph represented as an adjacency list."
    reference: |
      def topological_sort(graph):
          from collections import deque
          in_degree = {u: 0 for u in graph}
          for u in graph:
              for v in graph[u]:
                  in_degree[v] = in_degree.get(v, 0) + 1
          queue = deque([u for u in in_degree if in_degree[u] == 0])
          order = []
          while queue:
              node = queue.popleft()
              order.append(node)
              for v in graph.get(node, []):
                  in_degree[v] -= 1
                  if in_degree[v] == 0:
                      queue.append(v)
          return order if len(order) == len(in_degree) else []

  - id: code_050
    task_description: "implements a trie insert and search for a collection of words."
    reference: |
      class TrieNode:
          def __init__(self):
              self.children = {}
              self.is_end = False

      class Trie:
          def __init__(self):
              self.root = TrieNode()
          def insert(self, word):
              node = self.root
              for ch in word:
                  if ch not in node.children:
                      node.children[ch] = TrieNode()
                  node = node.children[ch]
              node.is_end = True
          def search(self, word):
              node = self.root
              for ch in word:
                  if ch not in node.children:
                      return False
                  node = node.children[ch]
              return node.is_end
