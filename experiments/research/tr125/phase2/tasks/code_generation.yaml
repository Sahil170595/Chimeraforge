      def find_pairs(lst, target):
          seen = set()
          pairs = set()
          for num in lst:
              complement = target - num
              if complement in seen:
                  pair = (min(num, complement), max(num, complement))
                  pairs.add(pair)
              seen.add(num)
          return sorted(pairs)

