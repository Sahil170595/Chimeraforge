name: creative_writing
description: >
  Open-ended creative text generation. Tests fluency, coherence,
  and creativity. No gold-standard reference — uses coherence and
  repetition metrics only.
task_type: creative_writing
metric_group: open_ended
output_type: generate
num_fewshot: 0

prompt_template: |
  {{ instruction }}

filters:
  - type: strip_whitespace

samples:
  - id: cw_001
    instruction: "Write a short paragraph describing a sunset over the ocean."

  - id: cw_002
    instruction: "Write a brief story about a robot learning to paint."

  - id: cw_003
    instruction: "Describe the feeling of discovering a hidden garden in a city."

  - id: cw_004
    instruction: "Write a short dialogue between a scientist and an AI about consciousness."

  - id: cw_005
    instruction: "Describe a futuristic library where books are replaced by holograms."

