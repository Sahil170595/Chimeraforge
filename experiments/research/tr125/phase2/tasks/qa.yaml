name: qa
description: >
  Answer factual questions concisely. Tests knowledge retrieval,
  factual accuracy, and concise response generation.
task_type: qa
metric_group: text_quality
output_type: generate
num_fewshot: 0

prompt_template: |
  Answer the following question concisely.

  Question: {{ question }}

  Answer:

filters:
  - type: strip_whitespace
  - type: truncate_at_newline

samples:
  - id: qa_001
    question: "What is the capital of France?"
    reference: "Paris"

  - id: qa_002
    question: "What programming language was created by Guido van Rossum?"
    reference: "Python"

  - id: qa_003
    question: "What is the chemical formula for water?"
    reference: "H2O"

  - id: qa_004
    question: "In what year did the first Moon landing occur?"
    reference: "1969"

  - id: qa_005
    question: "What is the largest planet in our solar system?"
    reference: "Jupiter"

  - id: qa_006
