name: classification
description: >
  Text classification tasks. Tests the model's ability to categorize
  text into predefined labels. Uses exact match scoring.
task_type: classification
metric_group: classification
output_type: generate
num_fewshot: 0

prompt_template: |
  Classify the following text into one of these categories: {{ categories }}

  Text: {{ text }}

  Category:

filters:
  - type: strip_whitespace
  - type: lowercase
  - type: truncate_at_newline

