# TR125 Phase 1: Quantization Decision Matrix
# 3 base models × 6 quant levels = 18 model entries via Ollama.
# Cross-references TR124 Phase 1 FP16 baselines for quality deltas.
#
# Setup: python research/tr125/phase1/setup_ollama.py
# Run:   python research/tr125/phase1/run.py
# Analyze: python research/tr125/phase1/analyze.py

experiment: tr125_quantization_matrix
description: >
  Quality-performance-cost curves across 6 quantization levels (Q2_K through
  Q8_0) for 3 models via Ollama. Each (model, quant) is a separate model entry.
  Produces the full decision matrix feeding TR131 and Paper 5.

models:
  # ── llama3.2-1b (1.2B params) ──────────────────────────────────────
  - name: llama3.2-1b-q2_K
    path: unsloth/Llama-3.2-1B
    params_m: 1236
    ollama_tag: "llama3.2:1b-instruct-q2_K"

  - name: llama3.2-1b-q3_K_S
    path: unsloth/Llama-3.2-1B
    params_m: 1236
    ollama_tag: "llama3.2:1b-instruct-q3_K_S"

  - name: llama3.2-1b-q4_K_M
    path: unsloth/Llama-3.2-1B
    params_m: 1236
    ollama_tag: "llama3.2:1b-instruct-q4_K_M"

  - name: llama3.2-1b-q5_K_M
    path: unsloth/Llama-3.2-1B
    params_m: 1236
    ollama_tag: "llama3.2:1b-instruct-q5_K_M"

  - name: llama3.2-1b-q6_K
    path: unsloth/Llama-3.2-1B
    params_m: 1236
    ollama_tag: "llama3.2:1b-instruct-q6_K"

  - name: llama3.2-1b-q8_0
    path: unsloth/Llama-3.2-1B
    params_m: 1236
    ollama_tag: "llama3.2:1b-instruct-q8_0"

  # ── qwen2.5-1.5b (1.5B params) ─────────────────────────────────────
  - name: qwen2.5-1.5b-q2_K
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
    ollama_tag: "qwen2.5:1.5b-instruct-q2_K"

  - name: qwen2.5-1.5b-q3_K_S
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
    ollama_tag: "qwen2.5:1.5b-instruct-q3_K_S"

  - name: qwen2.5-1.5b-q4_K_M
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
    ollama_tag: "qwen2.5:1.5b-instruct-q4_K_M"

  - name: qwen2.5-1.5b-q5_K_M
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
    ollama_tag: "qwen2.5:1.5b-instruct-q5_K_M"

  - name: qwen2.5-1.5b-q6_K
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
    ollama_tag: "qwen2.5:1.5b-instruct-q6_K"

  - name: qwen2.5-1.5b-q8_0
    path: Qwen/Qwen2.5-1.5B
    params_m: 1543
    ollama_tag: "qwen2.5:1.5b-instruct-q8_0"

  # ── phi-2 (2.7B params) ────────────────────────────────────────────
  - name: phi-2-q2_K
    path: microsoft/phi-2
    params_m: 2700
    ollama_tag: "phi:2.7b-chat-v2-q2_K"

  - name: phi-2-q3_K_S
    path: microsoft/phi-2
    params_m: 2700
    ollama_tag: "phi:2.7b-chat-v2-q3_K_S"

  - name: phi-2-q4_K_M
    path: microsoft/phi-2
    params_m: 2700
    ollama_tag: "phi:2.7b-chat-v2-q4_K_M"

  - name: phi-2-q5_K_M
    path: microsoft/phi-2
    params_m: 2700
    ollama_tag: "phi:2.7b-chat-v2-q5_K_M"

  - name: phi-2-q6_K
    path: microsoft/phi-2
    params_m: 2700
    ollama_tag: "phi:2.7b-chat-v2-q6_K"

  - name: phi-2-q8_0
    path: microsoft/phi-2
    params_m: 2700
    ollama_tag: "phi:2.7b-chat-v2-q8_0"

backends:
  - name: ollama
    ollama_url: http://localhost:11434
    extra:
      timeout_s: 180

task_paths:
  - scripts/eval/tasks/builtin/summarization.yaml
  - scripts/eval/tasks/builtin/qa.yaml
  - scripts/eval/tasks/builtin/code_generation.yaml
  - scripts/eval/tasks/builtin/creative_writing.yaml
  - scripts/eval/tasks/builtin/classification.yaml

# No benchmarks — Ollama cannot do loglikelihood ranking
benchmarks: []

repetitions: 1
seed: 42
max_new_tokens: 256
temperature: 0.0
batch_size: 1
warmup_runs: 2

backend_skip: {}

perplexity:
  enabled: false

resource_monitor: true
monitor_interval_s: 0.1
output_dir: results/eval/tr125
